        <div class="flex gap-3 mt-6">
          <button @click="taskModal.show=false" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200 transition-colors duration-150">取消</button>
          <button @click="saveTask()" :disabled="taskModal.loading" class="flex-1 py-2.5 rounded-lg bg-[#37352F] text-white text-sm hover:bg-black transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed" x-text="taskModal.loading?'保存中...':'保存'"></button>
        </div>
      </div>
    </div>

    <!-- 问题编辑/新建模态 -->
    <div x-show="issueModal.show" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" @keyup.escape.window="issueModal.show=false">
      <div class="absolute inset-0 bg-black/20" @click="issueModal.show=false"></div>
      <div class="relative bg-white rounded-xl shadow-xl w-full sm:max-w-lg rounded-t-xl sm:rounded-b-xl max-h-[85vh] overflow-y-auto p-4 sm:p-6 z-10">
        <h3 class="text-base font-semibold text-[#37352F] mb-5">
          <span x-text="issueModal.isNew?'新建问题':'编辑问题'"></span>
        </h3>
        <div class="space-y-4">
          <textarea x-model="issueForm.description" placeholder="问题描述" rows="2" class="notion-input resize-none"></textarea>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <select x-model="issueForm.source" class="notion-input text-sm !py-2">
              <option value="">问题来源</option>
              <option value="📋 例会">例会</option>
              <option value="🔍 检查">检查</option>
              <option value="💼 经营">经营</option>
              <option value="👥 客户">客户</option>
              <option value="🔧 运维">运维</option>
              <option value="📊 数据">数据</option>
              <option value="🤔 其他">其他</option>
            </select>
            <select x-model="issueForm.status" class="notion-input text-sm !py-2">
              <option value="待处理">待处理</option>
              <option value="处理中">处理中</option>
              <option value="已解决">已解决</option>
              <option value="已搁置">已搁置</option>
              <option value="已关闭">已关闭</option>
            </select>
          </div>
          <input x-model="issueForm.assignee" placeholder="输入责任人姓名" class="notion-input">
          <div x-show="!issueModal.isNew">
            <div class="text-xs text-gray-400 mb-1.5">解决方案</div>
            <textarea x-model="issueForm.solution" placeholder="解决方案" rows="2" class="notion-input resize-none"></textarea>
            <label x-show="issueForm.solution" class="flex items-center gap-2 mt-2 cursor-pointer select-none">
              <input type="checkbox" x-model="issueForm.createTaskFromSolution" class="w-4 h-4 rounded border-gray-300 text-[#37352F] focus:ring-[#37352F]">
              <span class="text-sm text-gray-600">将解决方案创建为新任务</span>
            </label>
          </div>
          <div x-show="errMsg" x-text="errMsg" class="text-red-500 text-sm"><i class="ti ti-alert-circle mr-1"></i><span x-text="errMsg"></span></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button @click="issueModal.show=false" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 text-sm hover:bg-gray-200 transition-colors duration-150">取消</button>
          <button @click="saveIssue()" :disabled="issueModal.loading" class="flex-1 py-2.5 rounded-lg bg-[#37352F] text-white text-sm hover:bg-black transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed" x-text="issueModal.loading?'保存中...':'保存'"></button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition.duration.150 class="fixed top-4 left-4 right-4 sm:left-auto sm:right-4 sm:w-auto sm:max-w-xs z-50 px-4 py-3 rounded-lg shadow-md text-sm flex items-center gap-2 bg-white border" :class="toast.type==='success'?'border-gray-200 text-[#37352F]':'border-red-200 text-red-600'">
      <i class="ti text-sm" :class="toast.type==='success'?'ti-check text-emerald-500':'ti-x text-red-500'"></i>
      <span x-text="toast.msg"></span>
    </div>

  </div>
</template>

<script>
function app() {
  return {
    authed: false, token: '', err: '', loading: false,
    showHelp: false,
    tab: 'today',  // 默认显示今日工作安排
    // 任务
    tasks: [], taskLoading: false,
    taskFilter: { status: '进行中', category: '', keyword: '', date_from: '', date_to: '' },
    taskSortBy: 'deadline_asc',
    taskModal: { show: false, isNew: true, loading: false },
    taskForm: { title:'', description:'', deadline:'', category:'', project:'', status:'进行中', progress:'', frequencyType:'', frequencyCustom:'', assignee:'', remind_me: false, time_start: '', time_end: '' },
    taskEditId: null,
    // 今日工作安排
    categoryList: ['🔵 A+工作', '🟠 地铁工作', '🟢 个人提升', '🟣 生活日常'],
    todayTasks: [],
    todayTotal: 0,
    todayLoading: false,
    newCard: { show: false, category: '', title: '', description: '', status: '进行中', project: '', assignee: '洋哥', time_start: '', time_end: '', remind_me: false, loading: false },
    // 问题
    issues: [], issueLoading: false,
    issueFilter: { status: '待处理', source: '', assignee: '', keyword: '' },
    issueModal: { show: false, isNew: true, loading: false },
    issueForm: { description:'', source:'', tags:[], assignee:'', status:'待处理', solution:'' },
    issueEditId: null,
    statusMenu: { type: '', id: '' },
    errMsg: '',
    toast: { show: false, msg: '', type: 'success' },
    // 笔记本
    noteTree: { children: [] },
    nbCurrentPath: '',
    nbQuill: null,
    nbUnsaved: false,
    nbSaving: false,
    noteReading: false,
    nbDisplayContent: '',
    nbAnnotations: [],
    nbDrawing: false,
    nbParaNumber: false,
    nbDrawLines: [],
    // 脏标记：各Tab数据是否需要刷新
    dirty: { tasks: true, today: true, issues: true, ideas: true, reminders: true, notebooks: true },
    // 想法库
    ideaList: [], ideaLoading: false,
    ideaSearch: '', ideaSearchTimer: null,
    ideaTag: '', ideaTagList: ['产品','技术','商业模式','营销','运营','内容','管理','人性','个人成长','其他'],
    ideaStatusList: ['灵感','探索中','已孵化','已落地','已搁置'],
    ideaStatusMenu: '',
    ideaDeleteId: '',
    // 想法详情/编辑
    ideaDetail: null,
    ideaModal: { show: false, isNew: false, loading: false, record_id: '', title: '', description: '', tags: [], source: '', priority: '⭐⭐中' },
    // 固定提醒
    reminderList: [], reminderLoading: false,
    reminderStatusMenu: '',
    reminderDeleteId: '',
    reminderModal: { show: false, isNew: false, loading: false, record_id: '', title: '', cycle_type: '每天', weekday: '', month_day: 0, hour: '09', minute: '00', note: '' },
    // 时间段选项
    timeOptions: Array.from({length: 37}, (_, i) => { const h = Math.floor((i*30+360)/60); const m = (i*30+360)%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }),
    // 日期选项：从今天起往后60天
    get dateOptions() {
      const opts = []; const now = new Date();
      for (let i = 0; i < 60; i++) {
        const d = new Date(now); d.setDate(d.getDate() + i);
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        const weekdays = ['日','一','二','三','四','五','六'];
        const label = (d.getMonth()+1)+'月'+d.getDate()+'日 周'+weekdays[d.getDay()];
        opts.push({ v: mm+'-'+dd, label });
      }
      return opts;
    },

    async init() {
      try {
        let r = await fetch('/api/auth/check'); let d = await r.json();
        this.authed = d.ok;
        if(this.authed) { this.loadTodayTasks(); this.loadTasks(); this.loadIssues(); this.loadReminders(); }
      } catch(e) { console.log(e) }
    },
    async login() {
      this.err=''; this.loading=true;
      try {
        let r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:this.token})});
        let d=await r.json();
        if(d.ok) { this.authed=true; this.loadTodayTasks(); this.loadTasks(); this.loadIssues(); }
        else this.err='密码错误';
      } catch(e) { this.err='网络错误'; }
      this.loading=false;
    },
    async logout() {
      await fetch('/api/auth/logout',{method:'POST'}); this.authed=false; this.token='';
    },
    // 智能切换Tab：脏则刷新，否则用缓存
    switchTab(name) {
      this.tab = name;
      if (this.dirty[name]) {
        this.dirty[name] = false;
        if (name === 'tasks') this.loadTasks();
        else if (name === 'today') this.loadTodayTasks();
        else if (name === 'issues') this.loadIssues();
        else if (name === 'ideas') this.loadIdeas();
        else if (name === 'reminders') this.loadReminders();
        else if (name === 'notebooks') this.loadNoteTree();
      }
    },
    // 标记某个Tab数据已过期
    markDirty(...tabs) { tabs.forEach(t => this.dirty[t] = true); },

    // ── 今日工作安排 ──
    async loadTodayTasks() {
      this.todayLoading=true;
      try {
        let r=await fetch('/api/tasks/today');
        let d=await r.json();
        const groups=d.groups||{};
        // 展平所有分类的任务为单一数组，按时间段排序
        let all = [];
        for (const cat of this.categoryList) {
          if (groups[cat]) all = all.concat(groups[cat]);
        }
        all.sort((a, b) => {
          // 有时间段的排前面
          const aHasSlot = a.time_slot ? 1 : 0;
          const bHasSlot = b.time_slot ? 1 : 0;
          if (aHasSlot !== bHasSlot) return bHasSlot - aHasSlot;
          // 按时间段开始时间升序
          if (a.time_slot && b.time_slot) {
            return a.time_slot.localeCompare(b.time_slot);
          }
          return 0;
        });
        this.todayTasks = all;
        this.todayTotal = all.length;
      } catch(e) { this.showToast('加载今日任务失败','error'); }
      this.todayLoading=false;
    },
    openNewCard(categoryKey) {
      // 计算默认时间段：当前时间后最近整点，结束=开始+1h
      const now = new Date();
      let sh = now.getHours() + (now.getMinutes() > 0 ? 1 : 0);
      if (sh > 23) sh = 23;
      const time_start = String(sh).padStart(2,'0') + ':00';
      let eh = sh + 1;
      if (eh > 23) eh = 23;
      const time_end = String(eh).padStart(2,'0') + ':00';
      this.newCard={show:true, category:categoryKey, title:'', description:'', status:'进行中', project:'', assignee:'洋哥', time_start, time_end, remind_me:false, loading:false};
    },
    async submitNewCard() {
      if(!this.newCard.title) { this.showToast('请输入任务标题','error'); return; }
      this.newCard.loading=true;
      try {
        let today=new Date();
        let deadline = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 0).getTime();
        // 构造 time_slot 字符串
        let time_slot = '';
        if(this.newCard.time_start && this.newCard.time_end) {
          time_slot = this.newCard.time_start + '-' + this.newCard.time_end;
        } else if(this.newCard.time_start) {
          time_slot = this.newCard.time_start;
        }
        let body={
          title:this.newCard.title,
          description:this.newCard.description,
          category:this.newCard.category,
          status:this.newCard.status,
          project:this.newCard.project,
          deadline:deadline,
          assignee:this.newCard.assignee||'洋哥',
          remind_me:this.newCard.remind_me||false,
          time_slot:time_slot
        };
        let r=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r.ok) {
          let d=await r.json().catch(()=>({}));
          if(r.status===401) { this.showToast('登录已过期，请刷新页面','error'); }
          else { this.showToast(d.detail||'创建失败','error'); }
          return;
        }
        let d=await r.json();
        if(d.record_id) {
          this.newCard.show=false;
          this.showToast('任务创建成功');
          this.markDirty('tasks','today');
          this.loadTodayTasks();
        } else {
          this.showToast(d.detail||'创建失败，请重试','error');
        }
      } catch(e) { this.showToast('网络错误，请重试','error'); }
      finally { this.newCard.loading=false; }
    },
    
    async deleteTaskConfirm(task) {
      if(!confirm('确定删除任务「'+task.title+'」？')) return;
      try {
        const r=await fetch('/api/tasks/'+task.record_id,{method:'DELETE'});
        if(!r.ok) { if(r.status===401){this.showToast('登录已过期，请刷新页面','error');return;} const d=await r.json().catch(()=>({})); this.showToast(d.detail||'删除失败','error'); return; }
        this.showToast('任务已删除');
        this.markDirty('tasks','today');
        this.loadTodayTasks();
      } catch(e) { this.showToast('删除失败','error'); }
    },
    
    fmtTime(ts) {
      if(!ts) return '';
      let d=new Date(ts);
      return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    },

    // ── 任务 ──
    async loadTasks() {
      this.taskLoading=true;
      let p=new URLSearchParams();
      if(this.taskFilter.status) p.set('status',this.taskFilter.status);
      if(this.taskFilter.category) p.set('category',this.taskFilter.category);
      if(this.taskFilter.keyword) p.set('keyword',this.taskFilter.keyword);
      try {
        let r=await fetch('/api/tasks?'+p.toString()); let d=await r.json();
        this.tasks=d.items||[];
      } catch(e) { this.showToast('加载任务失败','error'); }
      this.taskLoading=false;
    },
    sortedTasks() {
      const statusOrder = {'进行中':0,'已过期':1,'已取消':2,'已完成':3};
      let list = [...this.tasks];
      // 日期范围筛选
      if (this.taskFilter.date_from || this.taskFilter.date_to) {
        const from = this.taskFilter.date_from ? new Date(this.taskFilter.date_from).getTime() : 0;
        const to = this.taskFilter.date_to ? new Date(this.taskFilter.date_to + 'T23:59:59').getTime() : Infinity;
        list = list.filter(t => { const d = t.deadline || 0; return d >= from && d <= to; });
      }
      switch(this.taskSortBy) {
        case 'deadline_asc':  list.sort((a,b)=>(a.deadline||0)-(b.deadline||0)); break;
        case 'deadline_desc': list.sort((a,b)=>(b.deadline||0)-(a.deadline||0)); break;
        case 'created_desc':  list.sort((a,b)=>(b.created_time||0)-(a.created_time||0)); break;
        case 'created_asc':   list.sort((a,b)=>(a.created_time||0)-(b.created_time||0)); break;
        case 'title_asc':     list.sort((a,b)=>(a.title||'').localeCompare(b.title||'','zh')); break;
        case 'title_desc':    list.sort((a,b)=>(b.title||'').localeCompare(a.title||'','zh')); break;
        case 'status_asc':    list.sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9)); break;
      }
      return list;
    },
    openTaskCreate() {
      const now=new Date(), def=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T23:59';
      this.taskForm={title:'',description:'',deadline:'',deadlineStr:def,category:'',project:'',status:'进行中',progress:'',frequencyType:'',frequencyCustom:'',assignee:'洋哥',remind_me:false,time_start:'',time_end:''};
      this.rebuildDeadline();
      this.taskEditId=null; this.taskModal.isNew=true; this.errMsg=''; this.taskModal.show=true;
    },
    openTaskEdit(t) {
      // 从后端 frequency 数值反推 frequencyType 和 frequencyCustom
      let frequencyType = '', frequencyCustom = '';
      const freq = t.frequency || 0;
      if (freq === 1) frequencyType = '1';
      else if (freq === 7) frequencyType = '7';
      else if (freq === 30) frequencyType = '30';
      else if (freq > 0) { frequencyType = 'custom'; frequencyCustom = freq; }
      // 解析 time_slot
      let time_start = '', time_end = '';
      if (t.time_slot) {
        const parts = t.time_slot.split('-');
        if (parts.length === 2) { time_start = parts[0]; time_end = parts[1]; }
        else { time_start = t.time_slot; }
      }
      // 解析 deadline 为 datetime-local 字符串
      let deadline = '', deadlineStr = '';
      if (t.deadline) {
        deadline = t.deadline;
        const d = new Date(t.deadline);
        deadlineStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      } else {
        // 无截止时间，默认今天 23:59
        const now=new Date(); deadlineStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T23:59';
      }
      this.taskForm={
        title:t.title||'', description:t.description||'',
        deadline, deadlineStr,
        category:t.category||'', project:t.project||'',
        status:t.status||'进行中', progress:t.progress||'',
        frequencyType, frequencyCustom,
        assignee:t.assignee||'洋哥',
        remind_me:!!t.remind_me,
        time_start, time_end
      };
      this.taskEditId=t.record_id; this.taskModal.isNew=false; this.errMsg=''; this.taskModal.show=true;
    },
    rebuildDeadline() {
      // 从 datetime-local 字符串解析为毫秒时间戳
      const s = this.taskForm.deadlineStr;
      if (s) {
        const p = s.split('T'), dp = p[0].split('-'), tp = p[1].split(':');
        this.taskForm.deadline = new Date(parseInt(dp[0]), parseInt(dp[1])-1, parseInt(dp[2]), parseInt(tp[0]), parseInt(tp[1])).getTime();
      } else {
        this.taskForm.deadline = '';
      }
    },
    async saveTask() {
      if(!this.taskForm.title) { this.errMsg='请输入任务标题'; return; }
      this.taskModal.loading=true; this.errMsg='';
      // 保存前重新计算 deadline（防 iOS @change 不触发）
      this.rebuildDeadline();
      // 已过期任务延后截止时间→自动恢复进行中
      if(!this.taskModal.isNew && this.taskForm.status==='已过期' && this.taskForm.deadline && this.taskForm.deadline > Date.now()) {
        this.taskForm.status = '进行中';
      }
      let body={title:this.taskForm.title, description:this.taskForm.description, category:this.taskForm.category, project:this.taskForm.project, status:this.taskForm.status};
      if(this.taskForm.deadline) body.deadline=this.taskForm.deadline;
      if(!this.taskModal.isNew && this.taskForm.progress) body.progress=this.taskForm.progress;
      if(this.taskForm.assignee) body.assignee=this.taskForm.assignee;
      // 是否提醒
      body.remind_me=!!this.taskForm.remind_me;
      // 执行时间段
      let time_slot = '';
      if(this.taskForm.time_start && this.taskForm.time_end) time_slot = this.taskForm.time_start + '-' + this.taskForm.time_end;
      else if(this.taskForm.time_start) time_slot = this.taskForm.time_start;
      body.time_slot = time_slot;
      // 频率
      if(this.taskForm.frequencyType==='custom' && this.taskForm.frequencyCustom>0) body.frequency=this.taskForm.frequencyCustom;
      else if(this.taskForm.frequencyType && this.taskForm.frequencyType!=='custom') body.frequency=parseInt(this.taskForm.frequencyType);
      else body.frequency=0;
      try {
        let r;
        if(this.taskModal.isNew) r=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        else r=await fetch('/api/tasks/'+this.taskEditId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r.ok) {
          if(r.status===401){ this.errMsg='登录已过期，请刷新页面'; return; }
          let ed=await r.json().catch(()=>({}));
          this.errMsg=ed.detail||'保存失败'; return;
        }
        let d=await r.json();
        if(d.record_id) {
          this.taskModal.show=false;
          this.showToast(this.taskModal.isNew?'创建成功':'更新成功');
          if(this.taskModal.isNew) { this.loadTasks(); }
          else { let i=this.tasks.findIndex(t=>t.record_id===this.taskEditId); if(i>=0) this.tasks[i]=d; }
          this.markDirty('tasks','today');
        }
        else this.errMsg='保存失败';
      } catch(e) { this.errMsg='网络错误'; }
      this.taskModal.loading=false;
    },
    async quickStatus(t) {
      let newStatus = t.status==='已完成' ? '进行中' : '已完成';
      try {
        const r=await fetch('/api/tasks/'+t.record_id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
        if(!r.ok) { if(r.status===401){this.showToast('登录已过期，请刷新页面','error');return;} const d=await r.json().catch(()=>({})); this.showToast(d.detail||'操作失败','error'); return; }
        t.status = newStatus;
        this.markDirty('tasks','today');
      } catch(e) { this.showToast('操作失败','error'); }
    },

    downloadTasks() {
      // 只导出进行中的任务
      const active = this.sortedTasks().filter(t => t.status === '进行中');
      if (active.length === 0) { this.showToast('没有进行中的任务','error'); return; }
      const lines = active.map(t => {
        const deadline = t.deadline ? new Date(t.deadline).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '无';
        return `${t.title}\t${t.assignee || '洋哥'}\t${deadline}`;
      });
      const header = '任务标题\t负责人\t截止时间';
      const content = header + '\n' + lines.join('\n');
      const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const today = new Date().toISOString().slice(0,10);
      a.download = `任务清单_${today}.txt`;
      a.click();

    // ═══════════════════════════════════════════════════════
    // ═══ 笔记本方法 ═══
    // ═══════════════════════════════════════════════════════

    async loadNoteTree() {
      try {
        const r = await fetch('/api/notebooks/tree');
        if (!r.ok) { if(r.status===401){ this.showToast('登录已过期，请刷新页面','error'); return; } throw new Error('加载失败'); }
        const d = await r.json();

      } catch(e) { this.showToast(e.message, 'error'); }
    },

    nbCreateFile() {
      const name = prompt('输入笔记名称：');
      if (!name) return;
      this.nbCreateNode('', name, 'file');
    },
    nbCreateFileIn(parentPath) {
      const name = prompt('输入笔记名称：');
      if (!name) return;
      this.nbCreateNode(parentPath, name, 'file');
    },
    nbCreateFolder() {
      const name = prompt('输入文件夹名称：');
      if (!name) return;
      this.nbCreateNode('', name, 'folder');
    },
    nbCreateFolderIn(parentPath) {
      const name = prompt('输入文件夹名称：');
      if (!name) return;
      this.nbCreateNode(parentPath, name, 'folder');
    },

    async nbCreateNode(parentPath, name, nodeType) {
      try {
        const r = await fetch('/api/notebooks/nodes', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ parent_path: parentPath, name: name, node_type: nodeType })
        });
        if (!r.ok) {
          if(r.status===401){ this.showToast('登录已过期','error'); return; }
          const d = await r.json().catch(()=>({}));
          this.showToast(d.detail||'创建失败', 'error'); return;
        }
        this.showToast(nodeType==='folder'?'文件夹已创建':'笔记已创建');
        await this.loadNoteTree();
        // 如果是文件，自动打开
        if (nodeType === 'file') {
          const path = parentPath ? parentPath + '/' + name + '.html' : name + '.html';
          this.nbOpen(path);
        }
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    nbOpen(path) {
      // 如果当前有未保存的笔记，先提示
      if (this.nbUnsaved && this.nbCurrentPath) {
        if (!confirm('当前笔记未保存，切换将丢失更改。确定切换吗？')) return;
      }
      this.nbCurrentPath = path;
      this.noteReading = false;
      this.nbUnsaved = false;
      // 延迟初始化 Quill（等 DOM 渲染）
      this.$nextTick(() => { this.nbInitQuill(path); });
    },

    async nbInitQuill(path) {
      // 先销毁旧实例
      const editorEl = document.getElementById('note-editor');
      if (!editorEl) return;

      // 如果 quill 已存在，先销毁
      if (this.nbQuill) {
        this.nbQuill = null;
        editorEl.innerHTML = '';
      }

      // 加载内容
      let content = '';
      let annotations = [];
      let displaySettings = {};
      try {
        const r = await fetch('/api/notebooks/read?path=' + encodeURIComponent(path));
        if (!r.ok) { if(r.status===401){ this.showToast('登录已过期','error'); return; } throw new Error('加载失败'); }
        const d = await r.json();
        content = d.content || '';
        annotations = d.annotations || [];
        displaySettings = d.display_settings || {};
      } catch(e) { this.showToast(e.message, 'error'); return; }

      // 保存标注数据
      this.nbAnnotations = annotations;
      this.nbParaNumber = displaySettings.para_number || false;
      this.nbDrawLines = displaySettings.draw_lines || [];

      // 注册行间距自定义格式
      if (!window._quillLineHeightRegistered) {
        window._quillLineHeightRegistered = true;
        const Quill = window.Quill;
        const Parchment = Quill.import('parchment');
        const LineHeightStyle = new Parchment.Attributor.Style('lineheight', 'line-height', { scope: Parchment.Scope.INLINE_ATTRIBUTE });
        Quill.register({ 'formats/lineheight': LineHeightStyle }, true);
      }

      const Quill = window.Quill;

      // 创建 Quill 实例
      this.nbQuill = new Quill('#note-editor', {
        theme: 'snow',
        modules: {
          toolbar: {
            container: '#note-toolbar',
            handlers: {
              image: this.nbImageHandler.bind(this),
              divider: this.nbInsertDivider.bind(this),
            }
          }
        },
        placeholder: '开始输入...',
      });

      // 设置内容
      this.nbQuill.root.innerHTML = content;

      // 行间距下拉
      const lhSelect = document.querySelector('.ql-lineheight');
      if (lhSelect) {
        const heights = ['1.0', '1.5', '1.75', '2.0', '2.5', '3.0'];
        lhSelect.innerHTML = heights.map(h => `<option value="${h}">${h}</option>`).join('');
        lhSelect.addEventListener('change', () => {
          const val = lhSelect.value;
          this.nbQuill.format('lineheight', val);
        });
      }

      // 内容变化监听
      this.nbQuill.on('text-change', () => { this.nbUnsaved = true; });
    },

    nbImageHandler() {
      const input = document.createElement('input');
      input.setAttribute('type', 'file');
      input.setAttribute('accept', 'image/*');
      input.click();
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        try {
          const r = await fetch('/api/notebooks/upload', { method: 'POST', body: formData });
          if (!r.ok) { this.showToast('图片上传失败', 'error'); return; }
          const d = await r.json();
          const range = this.nbQuill.getSelection();
          this.nbQuill.insertEmbed(range.index, 'image', d.url);
          this.nbUnsaved = true;
        } catch(e) { this.showToast('图片上传失败', 'error'); }
      };
    },

    nbInsertDivider() {
      if (!this.nbQuill) return;
      const range = this.nbQuill.getSelection();
      this.nbQuill.insertText(range.index, '\n', 'user');
      this.nbQuill.insertEmbed(range.index + 1, 'divider', true);
      this.nbQuill.insertText(range.index + 2, '\n', 'user');
    },

    async nbSave() {
      if (!this.nbQuill || !this.nbCurrentPath) return;
      this.nbSaving = true;
      try {
        const content = this.nbQuill.root.innerHTML;
        const r = await fetch('/api/notebooks/save?path=' + encodeURIComponent(this.nbCurrentPath), {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ content: content })
        });
        if (!r.ok) {
          if(r.status===401){ this.showToast('登录已过期','error'); this.nbSaving=false; return; }
          const d = await r.json().catch(()=>({}));
          this.showToast(d.detail||'保存失败', 'error'); this.nbSaving=false; return;
        }
        this.nbUnsaved = false;
        this.showToast('已保存');
      } catch(e) { this.showToast(e.message, 'error'); }
      this.nbSaving = false;
    },

    async nbRename(node) {
      const newName = prompt('输入新名称：', node.name.replace(/\.html$/, ''));
      if (!newName || newName === node.name.replace(/\.html$/, '')) return;
      try {
        const r = await fetch('/api/notebooks/rename?path=' + encodeURIComponent(node.path), {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ new_name: newName + (node.type==='file' && !newName.endsWith('.html') ? '.html' : '') })
        });
        if (!r.ok) {
          if(r.status===401){ this.showToast('登录已过期','error'); return; }
          const d = await r.json().catch(()=>({}));
          this.showToast(d.detail||'重命名失败', 'error'); return;
        }
        const d = await r.json();
        // 如果是当前打开的文件，更新路径
        if (this.nbCurrentPath === node.path) {
          this.nbCurrentPath = d.new_path;
        }
        this.showToast('已重命名');
        await this.loadNoteTree();
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    async nbDelete(node) {
      if (!confirm('确定删除「' + node.name.replace(/\.html$/, '') + '」？' + (node.type==='folder' ? '\n该文件夹下所有内容将被删除。' : ''))) return;
      try {
        const r = await fetch('/api/notebooks/delete?path=' + encodeURIComponent(node.path), { method: 'DELETE' });
        if (!r.ok) {
          if(r.status===401){ this.showToast('登录已过期','error'); return; }
          const d = await r.json().catch(()=>({}));
          this.showToast(d.detail||'删除失败', 'error'); return;
        }
        if (this.nbCurrentPath === node.path || (this.nbCurrentPath && this.nbCurrentPath.startsWith(node.path + '/'))) {
          this.nbCurrentPath = '';
          this.noteReading = false;
        }
        this.showToast('已删除');
        await this.loadNoteTree();
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    // ── 展示模式 ──

    nbToggleReading() {
      if (!this.nbCurrentPath) return;
      // 如果编辑模式有未保存内容，先保存
      if (this.nbUnsaved && this.nbQuill) {
        this.nbSave();
      }
      // 获取内容并展示
      if (this.nbQuill) {
        this.nbDisplayContent = this.nbQuill.root.innerHTML;
      }
      this.noteReading = true;
      // 应用已保存的标注
      this.$nextTick(() => { this.nbApplyAnnotations(); });
    },

    nbApplyAnnotations() {
      // 应用高亮标注
      if (this.nbAnnotations && this.nbAnnotations.length > 0) {
        this.nbAnnotations.forEach(ann => {
          if (ann.type === 'highlight' && ann.text) {
            const content = this.$refs.readingContent;
            if (!content) return;
            this.nbHighlightText(content, ann.text, ann.color || 'yellow');
          }
        });
      }
      // 应用段落序号
      if (this.nbParaNumber) {
        this.$nextTick(() => {
          const content = this.$refs.readingContent;
          if (content) content.classList.add('auto-number');
        });
      }
      // 恢复画线
      if (this.nbDrawLines && this.nbDrawLines.length > 0) {
        this.$nextTick(() => { this.nbDrawLines = [...this.nbDrawLines]; });
      }
    },

    nbHighlightText(container, text, color) {
      const colorClass = 'note-highlight-' + color;
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, null);
      const nodes = [];
      let node;
      while (node = walker.nextNode()) {
        if (node.textContent.includes(text)) nodes.push(node);
      }
      nodes.forEach(textNode => {
        const idx = textNode.textContent.indexOf(text);
        if (idx === -1) return;
        const range = document.createRange();
        range.setStart(textNode, idx);
        range.setEnd(textNode, idx + text.length);
        const mark = document.createElement('mark');
        mark.className = colorClass;
        range.surroundContents(mark);
      });
    },

    nbHighlight(color) {
      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) {
        this.showToast('请先选择要标注的文字', 'error'); return;
      }
      const range = selection.getRangeAt(0);
      const content = this.$refs.readingContent;
      if (!content || !content.contains(range.commonAncestorContainer)) {
        this.showToast('请在文档内容区域选择文字', 'error'); return;
      }
      const mark = document.createElement('mark');
      mark.className = 'note-highlight-' + color;
      try {
        range.surroundContents(mark);
        // 记录标注
        const selectedText = selection.toString();
        this.nbAnnotations.push({ type: 'highlight', text: selectedText, color: color });
        selection.removeAllRanges();
      } catch(e) { this.showToast('无法标注此区域', 'error'); }
    },

    nbClearHighlight() {
      if (!confirm('确定清除所有标注？')) return;
      const content = this.$refs.readingContent;
      if (!content) return;
      // 移除所有 mark 元素，保留文本
      content.querySelectorAll('mark[class*="note-highlight"]').forEach(el => {
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
        parent.normalize();
      });
      this.nbAnnotations = [];
      this.showToast('已清除标注');
    },

    nbToggleParaNumber() {
      this.nbParaNumber = !this.nbParaNumber;
    },

    nbToggleDraw() {
      this.nbDrawing = !this.nbDrawing;
      const container = this.$refs.readingContainer;
      if (!container) return;
      if (this.nbDrawing) {
        container.classList.add('note-draw-active');
        this._drawStartHandler = (e) => this.nbDrawStart(e);
        this._drawMoveHandler = (e) => this.nbDrawMove(e);
        this._drawEndHandler = (e) => this.nbDrawEnd(e);
        container.addEventListener('mousedown', this._drawStartHandler);
        container.addEventListener('mousemove', this._drawMoveHandler);
        container.addEventListener('mouseup', this._drawEndHandler);
        container.addEventListener('mouseleave', this._drawEndHandler);
      } else {
        container.classList.remove('note-draw-active');
        container.removeEventListener('mousedown', this._drawStartHandler);
        container.removeEventListener('mousemove', this._drawMoveHandler);
        container.removeEventListener('mouseup', this._drawEndHandler);
        container.removeEventListener('mouseleave', this._drawEndHandler);
      }
    },

    nbDrawStart(e) {
      this._drawStartPos = this.nbGetMousePos(e);
      this._drawing = true;
    },
    nbDrawMove(e) {
      if (!this._drawing) return;
      const pos = this.nbGetMousePos(e);
      // 实时更新临时线
      this.nbDrawLines = this.nbDrawLines.filter(l => !l._temp);
      this.nbDrawLines.push({ x1: this._drawStartPos.x, y1: this._drawStartPos.y, x2: pos.x, y2: pos.y, _temp: true });
    },
    nbDrawEnd(e) {
      if (!this._drawing) return;
      this._drawing = false;
      const pos = this.nbGetMousePos(e);
      // 替换临时线为正式线
      this.nbDrawLines = this.nbDrawLines.filter(l => !l._temp);
      // 只有线足够长才保存
      const dx = pos.x - this._drawStartPos.x;
      const dy = pos.y - this._drawStartPos.y;
      if (Math.sqrt(dx*dx + dy*dy) > 10) {
        this.nbDrawLines.push({ x1: this._drawStartPos.x, y1: this._drawStartPos.y, x2: pos.x, y2: pos.y });
      }
    },
    nbGetMousePos(e) {
      const container = this.$refs.readingContainer;
      if (!container) return { x: 0, y: 0 };
      const rect = container.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    },
    nbRemoveLine(idx) {
      this.nbDrawLines.splice(idx, 1);
    },

    async nbSaveReading() {
      if (!this.nbCurrentPath) return;
      try {
        const displaySettings = {
          para_number: this.nbParaNumber,
          draw_lines: this.nbDrawLines.map(l => ({ x1: l.x1, y1: l.y1, x2: l.x2, y2: l.y2 })),
        };
        const r = await fetch('/api/notebooks/annotations?path=' + encodeURIComponent(this.nbCurrentPath), {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ display_settings: displaySettings, annotations: this.nbAnnotations })
        });
        if (!r.ok) {
          if(r.status===401){ this.showToast('登录已过期','error'); return; }
          this.showToast('保存失败', 'error'); return;
        }
        this.showToast('标注已保存');
      } catch(e) { this.showToast(e.message, 'error'); }
    }
  };
}
function toLocalDatetime(ts) {
  let d=new Date(ts); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':00+08:00';
}
